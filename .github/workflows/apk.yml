name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --version
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Prepare web assets
        run: |
          mkdir -p www
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'android/' \
            --exclude 'node_modules/' \
            --exclude 'www/' \
            ./ www/

      - name: Create Android project (Capacitor)
        run: |
          npm init -y
          npm i @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "k" "com.ahmed3500500.k" --web-dir=www
          npx cap add android
          npx cap copy android
          chmod +x android/gradlew
          python3 - <<'PY'
          from pathlib import Path
          
          kotlin_version = "1.8.22"
          
          groovy = Path("android/build.gradle")
          kts = Path("android/build.gradle.kts")
          
          if groovy.exists():
              content = groovy.read_text(encoding="utf-8")
              patch = (
                  "\n\nallprojects {\n"
                  "  configurations.all {\n"
                  "    resolutionStrategy {\n"
                  f"      force \"org.jetbrains.kotlin:kotlin-stdlib:{kotlin_version}\"\n"
                  f"      force \"org.jetbrains.kotlin:kotlin-stdlib-jdk7:{kotlin_version}\"\n"
                  f"      force \"org.jetbrains.kotlin:kotlin-stdlib-jdk8:{kotlin_version}\"\n"
                  "    }\n"
                  "  }\n"
                  "}\n"
              )
              if "resolutionStrategy" not in content or "kotlin-stdlib-jdk8" not in content:
                  groovy.write_text(content + patch, encoding="utf-8")
          elif kts.exists():
              content = kts.read_text(encoding="utf-8")
              patch = (
                  "\n\nallprojects {\n"
                  "  configurations.all {\n"
                  "    resolutionStrategy {\n"
                  f"      force(\"org.jetbrains.kotlin:kotlin-stdlib:{kotlin_version}\")\n"
                  f"      force(\"org.jetbrains.kotlin:kotlin-stdlib-jdk7:{kotlin_version}\")\n"
                  f"      force(\"org.jetbrains.kotlin:kotlin-stdlib-jdk8:{kotlin_version}\")\n"
                  "    }\n"
                  "  }\n"
                  "}\n"
              )
              if "resolutionStrategy" not in content or "kotlin-stdlib-jdk8" not in content:
                  kts.write_text(content + patch, encoding="utf-8")
          else:
              raise SystemExit("Could not find android/build.gradle or android/build.gradle.kts")
          PY

      - name: Build debug APK
        run: |
          cd android
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
