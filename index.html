<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سوبر أيجنتيو - Super Agentio</title>
    <link rel="stylesheet" href="style.css">
    <script src="phaser.min.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- شاشة البداية -->
        <div id="main-menu" class="overlay">
            <img src="logo.png" alt="Super Agentio" class="game-logo">
            <h1 class="game-title">SUPER AGENTIO</h1>
            <p>مغامرة الأندرويد الرسمية</p>
            <button class="btn-start" onclick="startGame()">ابدأ المغامرة</button>
            <div class="controls-hint">الأسهم للتحرك | القفز باللمس أو المسافة</div>
        </div>
    </div>
    <script src="game.js"></script>
    <script>
        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            // إرسال إشارة للعبة لبدء الميكانيكا
            if (window.gameInstance) {
                window.gameInstance.scene.scenes[0].events.emit('start-game');
            }
        }
    </script>
</body>
</html>
